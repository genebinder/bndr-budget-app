<svg xmlns="http://www.w3.org/2000/svg" width="1000" height="400" viewBox="0 0 1000 400">
  <rect width="1000" height="400" fill="#ffffff"/>

  <!-- Icon: aperture / near-complete ring with a clean break -->
  <g transform="translate(120 120)">
    <path d="M 80 0 A 80 80 0 1 0 160 80"
          fill="none" stroke="#0A0A0A" stroke-width="22" stroke-linecap="round"/>
  </g>

  <!-- Divider -->
  <line x1="380" y1="120" x2="380" y2="280" stroke="#e6e4dd" stroke-width="1"/>

  <!-- Wordmark -->
  <g transform="translate(430 0)">
    <text x="0" y="230"
          font-family="'Inter', 'SF Pro Display', 'Helvetica Neue', ui-sans-serif, system-ui"
          font-size="110" font-weight="800" letter-spacing="-2" fill="#0A0A0A">BNDR</text>
    <text x="4" y="268"
          font-family="'Inter', 'SF Pro Display', 'Helvetica Neue', ui-sans-serif, system-ui"
          font-size="16" font-weight="500" letter-spacing="10" fill="#6B6B65">CAPITAL</text>
  </g>

  <!-- App icon preview -->
  <g transform="translate(860 300)">
    <rect x="0" y="0" width="80" height="80" rx="18" fill="#0A0A0A"/>
    <path d="M 40 18 A 22 22 0 1 0 62 40"
          fill="none" stroke="#ffffff" stroke-width="6" stroke-linecap="round"
          transform="translate(0 0)"/>
  </g>

  <text x="900" y="280"
        text-anchor="middle"
        font-family="'Inter', ui-sans-serif, system-ui"
        font-size="9" font-weight="500" letter-spacing="2" fill="#8a8a85">APP ICON</text>
</svg>
