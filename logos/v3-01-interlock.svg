<svg xmlns="http://www.w3.org/2000/svg" width="1000" height="400" viewBox="0 0 1000 400">
  <rect width="1000" height="400" fill="#ffffff"/>

  <!-- Icon: BN interlock — a mirrored-B monogram, Chanel-energy but modern geometric -->
  <g transform="translate(100 110)">
    <!-- Right-facing B (front) -->
    <g fill="#0A0A0A">
      <rect x="60" y="0" width="14" height="180" rx="1"/>
      <path d="M 74 0 L 108 0 A 45 45 0 0 1 108 90 L 74 90 Z"/>
      <path d="M 74 90 L 112 90 A 47 47 0 0 1 112 184 L 74 184 Z"/>
    </g>
    <rect x="74" y="14" width="32" height="62" fill="#ffffff"/>
    <rect x="74" y="104" width="34" height="66" fill="#ffffff"/>

    <!-- Left-facing (mirrored) B — rear, subtly lighter to suggest overlap depth -->
    <g fill="#0A0A0A" opacity="0.3">
      <rect x="146" y="0" width="14" height="180" rx="1"/>
      <path d="M 146 0 L 112 0 A 45 45 0 0 0 112 90 L 146 90 Z"/>
      <path d="M 146 90 L 108 90 A 47 47 0 0 0 108 184 L 146 184 Z"/>
    </g>
  </g>

  <!-- Divider -->
  <line x1="380" y1="120" x2="380" y2="280" stroke="#e6e4dd" stroke-width="1"/>

  <!-- Wordmark -->
  <g transform="translate(430 0)">
    <text x="0" y="220"
          font-family="'Inter', 'SF Pro Display', 'Helvetica Neue', ui-sans-serif, system-ui"
          font-size="104" font-weight="700" letter-spacing="-1" fill="#0A0A0A">BNDR</text>
    <text x="3" y="258"
          font-family="'Inter', 'SF Pro Display', 'Helvetica Neue', ui-sans-serif, system-ui"
          font-size="15" font-weight="500" letter-spacing="9" fill="#6B6B65">CAPITAL</text>
  </g>

  <!-- App icon preview -->
  <g transform="translate(860 300)">
    <rect x="0" y="0" width="80" height="80" rx="18" fill="#0A0A0A"/>
    <g transform="translate(22 16)" fill="#ffffff">
      <rect x="12" y="0" width="4" height="48" rx="0.5"/>
      <path d="M 16 0 L 26 0 A 12 12 0 0 1 26 24 L 16 24 Z"/>
      <path d="M 16 24 L 27 24 A 12.5 12.5 0 0 1 27 48 L 16 48 Z"/>
    </g>
    <g transform="translate(22 16)" fill="#ffffff" opacity="0.35">
      <rect x="36" y="0" width="4" height="48" rx="0.5"/>
      <path d="M 36 0 L 26 0 A 12 12 0 0 0 26 24 L 36 24 Z"/>
      <path d="M 36 24 L 25 24 A 12.5 12.5 0 0 0 25 48 L 36 48 Z"/>
    </g>
  </g>

  <text x="900" y="280" text-anchor="middle"
        font-family="'Inter', ui-sans-serif, system-ui"
        font-size="9" font-weight="500" letter-spacing="2" fill="#8a8a85">APP ICON</text>
</svg>
