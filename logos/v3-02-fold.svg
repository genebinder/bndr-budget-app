<svg xmlns="http://www.w3.org/2000/svg" width="1000" height="400" viewBox="0 0 1000 400">
  <defs>
    <linearGradient id="foldFront" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1a1a1a"/>
      <stop offset="100%" stop-color="#0A0A0A"/>
    </linearGradient>
    <linearGradient id="foldBack" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#4a4a4a"/>
      <stop offset="100%" stop-color="#2d2d2d"/>
    </linearGradient>
  </defs>
  <rect width="1000" height="400" fill="#ffffff"/>

  <!-- Icon: a dimensional fold — two planes meeting, tactile and ownable -->
  <g transform="translate(120 120)">
    <!-- Back plane -->
    <path d="M 80 0 L 180 40 L 180 180 L 80 140 Z" fill="url(#foldBack)"/>
    <!-- Front plane -->
    <path d="M 0 40 L 100 0 L 100 140 L 0 180 Z" fill="url(#foldFront)"/>
    <!-- Crease highlight -->
    <line x1="100" y1="0" x2="100" y2="140" stroke="#ffffff" stroke-width="1" opacity="0.12"/>
  </g>

  <!-- Divider -->
  <line x1="380" y1="120" x2="380" y2="280" stroke="#e6e4dd" stroke-width="1"/>

  <!-- Wordmark -->
  <g transform="translate(430 0)">
    <text x="0" y="220"
          font-family="'Inter', 'SF Pro Display', 'Helvetica Neue', ui-sans-serif, system-ui"
          font-size="104" font-weight="700" letter-spacing="-1" fill="#0A0A0A">BNDR</text>
    <text x="3" y="258"
          font-family="'Inter', 'SF Pro Display', 'Helvetica Neue', ui-sans-serif, system-ui"
          font-size="15" font-weight="500" letter-spacing="9" fill="#6B6B65">CAPITAL</text>
  </g>

  <!-- App icon -->
  <g transform="translate(860 300)">
    <rect x="0" y="0" width="80" height="80" rx="18" fill="#0A0A0A"/>
    <g transform="translate(22 20)">
      <path d="M 18 4 L 40 12 L 40 40 L 18 32 Z" fill="#6e6e6e"/>
      <path d="M 0 12 L 22 4 L 22 32 L 0 40 Z" fill="#ffffff"/>
    </g>
  </g>

  <text x="900" y="280" text-anchor="middle"
        font-family="'Inter', ui-sans-serif, system-ui"
        font-size="9" font-weight="500" letter-spacing="2" fill="#8a8a85">APP ICON</text>
</svg>
