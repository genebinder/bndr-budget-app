<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="theme-color" content="#ffffff">
  <title>BNDR — Payment Portal</title>
  <style>
    :root {
      --green: #6B7A59; --green-dark: #5a6a4a; --green-light: #e8ede4; --green-bg: #f4f6f2;
      --dark: #2D2D2D; --text: #222; --muted: #888; --light-text: #aaa;
      --border: #e0e0e0; --card: #fff; --bg: #f1f5f0;
      --red: #dc2626; --red-light: #fef2f2; --red-text: #b91c1c;
      --amber: #f59e0b; --amber-light: #fffbeb;
      --radius: 12px;
    }
    * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
    body {
      font-family: -apple-system, 'SF Pro Text', system-ui, sans-serif;
      background: var(--bg); color: var(--text);
      padding: 0; -webkit-font-smoothing: antialiased;
    }
    .portal-header {
      background: #fff; color: var(--dark);
      border-bottom: 1px solid var(--border);
      padding: env(safe-area-inset-top, 0px) 16px 0;
      height: calc(52px + env(safe-area-inset-top, 0px));
      display: flex; align-items: center; gap: 10px;
    }
    .portal-header .hdr-logo { width: 120px; height: auto; flex-shrink: 0; }
    .portal-header .hdr-sub { font-size: .6rem; color: var(--muted); letter-spacing: 1px; }
    .container { padding: 12px; max-width: 500px; margin: 0 auto; }
    .card {
      background: var(--card); border-radius: var(--radius);
      padding: 16px; margin-bottom: 10px;
      box-shadow: 0 1px 3px rgba(0,0,0,.06);
    }
    .card-title {
      font-size: .72rem; font-weight: 700; color: var(--green);
      text-transform: uppercase; letter-spacing: 1px; margin-bottom: 10px;
    }
    .summary-card {
      background: linear-gradient(135deg, var(--dark) 0%, #3a3a3a 100%);
      color: #fff; border-radius: var(--radius); padding: 18px;
      margin-bottom: 12px;
    }
    .summary-row { display: flex; justify-content: space-between; align-items: center; padding: 3px 0; }
    .summary-label { font-size: .78rem; color: rgba(255,255,255,.7); }
    .summary-value { font-size: .88rem; font-weight: 700; }
    .summary-big { font-size: 1.1rem; font-weight: 900; }
    .summary-divider { border-top: 1px solid rgba(255,255,255,.15); margin: 8px 0; }
    .positive { color: #4ade80; }
    .negative { color: #f87171; }
    .progress-wrap { background: rgba(255,255,255,.15); border-radius: 6px; height: 8px; margin-top: 8px; overflow: hidden; }
    .progress-fill { height: 100%; border-radius: 6px; transition: width .3s; background: var(--green); }
    .fg { margin-bottom: 10px; }
    .fg label { font-size: .72rem; font-weight: 600; color: var(--muted); display: block; margin-bottom: 3px; }
    .fg input, .fg textarea, .fg select {
      width: 100%; border: 1.5px solid var(--border); border-radius: 8px;
      padding: 10px 12px; font-size: 16px; font-family: inherit;
      color: var(--text); background: #fafbfa; outline: none;
      -webkit-appearance: none; appearance: none;
    }
    .fg input:focus, .fg select:focus { border-color: var(--green); background: #fff; }
    .row2 { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
    .markup-row { display: flex; gap: 4px; margin-top: 3px; }
    .markup-btn {
      border: none; background: var(--amber-light); color: #92400e;
      font-size: .58rem; font-weight: 700; padding: 3px 7px;
      border-radius: 5px; cursor: pointer; font-family: inherit;
      white-space: nowrap; -webkit-appearance: none;
    }
    .markup-btn:active { background: #fde68a; }
    .add-form { background: var(--green-bg); border-radius: var(--radius); padding: 16px; margin-bottom: 10px; }
    .btn {
      display: block; width: 100%; padding: 13px 16px; border: none;
      border-radius: 10px; font-size: .85rem; font-weight: 700;
      cursor: pointer; font-family: inherit; text-align: center;
      -webkit-appearance: none;
    }
    .btn-green { background: var(--green); color: #fff; }
    .btn-green:active { background: var(--green-dark); }
    .btn-green:disabled { opacity: .5; cursor: not-allowed; }
    .mt { margin-top: 10px; }
    .hidden { display: none !important; }
    .toast {
      position: fixed; top: 0; left: 0; right: 0; padding: 14px 16px;
      font-size: .82rem; font-weight: 600; text-align: center; z-index: 200;
      transform: translateY(-100%); transition: transform .3s ease;
    }
    .toast.show { transform: translateY(0); }
    .toast.success { background: #dcfce7; color: #166534; border-bottom: 1px solid #86efac; }
    .toast.error { background: var(--red-light); color: var(--red-text); border-bottom: 1px solid #fca5a5; }
    /* Receipt upload zone */
    .receipt-zone {
      border: 2px dashed var(--border); border-radius: 10px;
      padding: 20px 16px; text-align: center; cursor: pointer;
      transition: border-color .2s, background .2s;
      position: relative; min-height: 80px;
      display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 6px;
      background: #fafbfa;
    }
    .receipt-zone.dragover { border-color: var(--green); background: var(--green-light); }
    .receipt-zone .rz-icon { font-size: 1.5rem; color: var(--muted); line-height: 1; }
    .receipt-zone .rz-text { font-size: .78rem; color: var(--muted); line-height: 1.4; }
    .receipt-zone .rz-text strong { color: var(--green); }
    .receipt-zone input[type="file"] { position: absolute; inset: 0; opacity: 0; cursor: pointer; }
    .receipt-preview { position: relative; border-radius: 10px; overflow: hidden; background: #f8f8f8; }
    .receipt-preview img { display: block; width: 100%; max-height: 200px; object-fit: contain; border-radius: 10px; }
    .receipt-preview .rp-remove {
      position: absolute; top: 6px; right: 6px; width: 28px; height: 28px;
      border-radius: 50%; border: none; background: rgba(0,0,0,.6); color: #fff;
      font-size: .85rem; cursor: pointer; display: flex; align-items: center; justify-content: center;
      -webkit-appearance: none;
    }
    .receipt-preview .rp-name { font-size: .68rem; color: var(--muted); padding: 4px 8px; text-align: center; }
    .loading { text-align: center; padding: 30px; color: var(--muted); font-size: .85rem; }
    .spinner { display: inline-block; width: 20px; height: 20px; border: 2.5px solid var(--border); border-top-color: var(--green); border-radius: 50%; animation: spin .6s linear infinite; margin-right: 8px; vertical-align: middle; }
    @keyframes spin { to { transform: rotate(360deg); } }
    .company-info { text-align: center; padding: 16px; font-size: .65rem; color: var(--light-text); line-height: 1.5; }
  </style>

  <!-- Firebase SDK (compat for vanilla JS) -->
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-storage-compat.js"></script>
  <!-- EmailJS SDK -->
  <script src="https://cdn.jsdelivr.net/npm/@emailjs/browser@4/dist/email.min.js"></script>
</head>

(function() {
  /* ── State ── */
  var projects = [];
  var selectedProject = null;

  /* ── Utilities ── */
  function fmt(n) { return n.toLocaleString('en-US', { minimumFractionDigits: 0, maximumFractionDigits: 0 }); }
  function parseMoney(s) { if (typeof s === 'number') return s; return parseFloat((s || '').replace(/[^0-9.\-]/g, '')) || 0; }
  function todayStr() { var d = new Date(); return (d.getMonth()+1) + '/' + d.getDate() + '/' + d.getFullYear(); }
  function esc(s) { var d = document.createElement('div'); d.textContent = s; return d.innerHTML; }

  function showToast(msg, type) {
    var t = document.getElementById('toast');
    t.textContent = msg;
    t.className = 'toast ' + type + ' show';
    setTimeout(function() { t.classList.remove('show'); }, 4000);
  }

  /* ── Receipt Image State ── */
  var receiptBase64 = null;
  var MAX_IMG_W = 1200;
  var MAX_B64_BYTES = 4 * 1024 * 1024;
  var JPEG_QUALITY = 0.7;

  function processReceiptImage(file) {
    if (!file || !file.type.match(/^image\//)) {
      showToast('Please select an image file.', 'error'); return;
    }
    if (file.size > 20 * 1024 * 1024) {
      showToast('Image too large. Please use a smaller image.', 'error'); return;
    }
    var reader = new FileReader();
    reader.onload = function(e) {
      var img = new Image();
      img.onload = function() {
        var w = img.width, h = img.height;
        if (w > MAX_IMG_W) { h = Math.round(h * (MAX_IMG_W / w)); w = MAX_IMG_W; }
        var canvas = document.createElement('canvas');
        canvas.width = w; canvas.height = h;
        canvas.getContext('2d').drawImage(img, 0, 0, w, h);
        var dataUrl = canvas.toDataURL('image/jpeg', JPEG_QUALITY);
        var b64Len = dataUrl.length - dataUrl.indexOf(',') - 1;
        if (b64Len > MAX_B64_BYTES) {
          dataUrl = canvas.toDataURL('image/jpeg', 0.4);
          b64Len = dataUrl.length - dataUrl.indexOf(',') - 1;
          if (b64Len > MAX_B64_BYTES) {
            showToast('Image still too large after compression. Try a smaller image.', 'error'); return;
          }
        }
        receiptBase64 = dataUrl;
        showReceiptPreview(dataUrl, file.name || 'receipt.jpg');
      };
      img.onerror = function() { showToast('Could not read image. Try a different file.', 'error'); };
      img.src = e.target.result;
    };
    reader.onerror = function() { showToast('Could not read file.', 'error'); };
    reader.readAsDataURL(file);
  }

  function showReceiptPreview(dataUrl, name) {
    document.getElementById('receipt-img').src = dataUrl;
    document.getElementById('receipt-name').textContent = name;
    document.getElementById('receipt-zone').classList.add('hidden');
    document.getElementById('receipt-preview').classList.remove('hidden');
  }

  function clearReceiptPreview() {
    receiptBase64 = null;
    document.getElementById('receipt-img').src = '';
    document.getElementById('receipt-name').textContent = '';
    document.getElementById('receipt-preview').classList.add('hidden');
    document.getElementById('receipt-zone').classList.remove('hidden');
    document.getElementById('receipt-file').value = '';
  }

  /* ── Receipt Event Handlers ── */
  document.getElementById('receipt-file').addEventListener('change', function() {
    if (this.files && this.files[0]) processReceiptImage(this.files[0]);
  });

  var dropZone = document.getElementById('receipt-zone');
  dropZone.addEventListener('dragover', function(e) { e.preventDefault(); this.classList.add('dragover'); });
  dropZone.addEventListener('dragleave', function() { this.classList.remove('dragover'); });
  dropZone.addEventListener('drop', function(e) {
    e.preventDefault(); this.classList.remove('dragover');
    if (e.dataTransfer.files && e.dataTransfer.files[0]) processReceiptImage(e.dataTransfer.files[0]);
  });

  document.addEventListener('paste', function(e) {
    if (document.getElementById('pay-form-wrap').classList.contains('hidden')) return;
    var items = (e.clipboardData || {}).items || [];
    for (var i = 0; i < items.length; i++) {
      if (items[i].type.indexOf('image/') === 0) {
        e.preventDefault();
        processReceiptImage(items[i].getAsFile());
        return;
      }
    }
  });

  document.getElementById('receipt-remove').addEventListener('click', function() { clearReceiptPreview(); });

  /* ── Load Projects from Firestore ── */
  function loadProjects() {
    // Wait for Firebase auth
    function doLoad() {
      // Read project index from Firestore
      db.collection('meta').doc('projectIndex').get().then(function(indexDoc) {
        var index = [];
        if (indexDoc.exists && indexDoc.data().index) {
          try { index = JSON.parse(indexDoc.data().index); } catch(e) {}
        }
        if (index.length === 0) {
          document.getElementById('loading').innerHTML =
            '<span style="color:var(--muted);">No projects found.</span>';
          return;
        }
        // Load each project to build the projects array for the portal
        return db.collection('projects').get().then(function(snapshot) {
          var projectMap = {};
          snapshot.forEach(function(doc) {
            try { projectMap[doc.id] = JSON.parse(doc.data().data); } catch(e) {}
          });

          projects = [];
          for (var i = 0; i < index.length; i++) {
            var pid = index[i].id;
            var pData = projectMap[pid];
            if (!pData || !pData.project) continue;

            // Build contractors list
            var contractors = [], seenCon = {};
            for (var c = 0; c < (pData.categories || []).length; c++) {
              var cat = pData.categories[c];
              var cName = (cat.contractor || '').trim();
              if (cName && !seenCon[cName.toLowerCase()]) { contractors.push(cName); seenCon[cName.toLowerCase()] = true; }
              for (var ci = 0; ci < (cat.items || []).length; ci++) {
                var iName = (cat.items[ci].contractor || '').trim();
                if (iName && !seenCon[iName.toLowerCase()]) { contractors.push(iName); seenCon[iName.toLowerCase()] = true; }
              }
            }
            for (var pi = 0; pi < (pData.payments || []).length; pi++) {
              var pCon = (pData.payments[pi].contractor || '').trim();
              if (pCon && !seenCon[pCon.toLowerCase()]) { contractors.push(pCon); seenCon[pCon.toLowerCase()] = true; }
            }

            // Build categories list and totals
            var cats = [], totalEst = 0, totalPaid = 0;
            for (var c = 0; c < (pData.categories || []).length; c++) {
              var cat = pData.categories[c];
              var catEst = cat.totalEstimate || 0;
              if (!catEst) { for (var ci = 0; ci < (cat.items || []).length; ci++) catEst += (cat.items[ci].estimated || 0); }
              cats.push({ name: cat.name, estimated: catEst, contractor: cat.contractor || '' });
              totalEst += catEst;
            }
            for (var pi = 0; pi < (pData.payments || []).length; pi++) {
              totalPaid += Number(pData.payments[pi].amount) || 0;
            }

            projects.push({
              id: pid,
              name: pData.project.address || 'Untitled Project',
              categories: cats,
              contractors: contractors,
              totalEstimated: totalEst,
              totalPaid: totalPaid
            });
          }

          document.getElementById('loading').classList.add('hidden');
          document.getElementById('app').classList.remove('hidden');
          populateProjectSelector();
        });
      }).catch(function(err) {
        document.getElementById('loading').innerHTML =
          '<span style="color:var(--red);">Failed to load projects: ' + esc(err.message) + '</span>';
      });
    }

    // Wait for auth to be ready
    auth.onAuthStateChanged(function(user) {
      if (user) doLoad();
      else {
        document.getElementById('loading').innerHTML =
          '<span style="color:var(--red);">Authentication failed. Please refresh.</span>';
      }
    });
  }

  function populateProjectSelector() {
    var sel = document.getElementById('project-select');
    var html = '<option value="">— Choose a project —</option>';
    for (var i = 0; i < projects.length; i++) {
      html += '<option value="' + i + '">' + esc(projects[i].name || 'Untitled Project') + '</option>';
    }
    sel.innerHTML = html;
  }

  /* ── Project Change ── */
  document.getElementById('project-select').addEventListener('change', function() {
    var idx = this.value;
    if (idx === '') {
      selectedProject = null;
      document.getElementById('budget-summary').innerHTML = '';
      document.getElementById('pay-form-wrap').classList.add('hidden');
      return;
    }
    selectedProject = projects[parseInt(idx)];
    renderBudgetSummary();
    populateFormDropdowns();
    document.getElementById('pay-form-wrap').classList.remove('hidden');
    document.getElementById('pf-date').value = todayStr();
  });

  /* ── Budget Summary ── */
  function renderBudgetSummary() {
    if (!selectedProject) return;
    var totalEst = selectedProject.totalEstimated || 0;
    var totalPaid = selectedProject.totalPaid || 0;
    var remaining = totalEst - totalPaid;
    var isOver = remaining < 0;
    var pct = totalEst > 0 ? Math.min(100, Math.round((totalPaid / totalEst) * 100)) : 0;

    var html =
      '<div class="summary-card">' +
        '<div class="summary-row"><span class="summary-label">Contract Total (Estimated)</span><span class="summary-value">$' + fmt(totalEst) + '</span></div>' +
        '<div class="summary-row"><span class="summary-label">Total Paid</span><span class="summary-value">$' + fmt(totalPaid) + '</span></div>' +
        '<div class="summary-divider"></div>' +
        '<div class="summary-row"><span class="summary-label">' + (isOver ? 'Overpaid' : 'Remaining Balance') + '</span>' +
        '<span class="summary-big ' + (isOver ? 'negative' : 'positive') + '">$' + fmt(Math.abs(remaining)) + (isOver ? ' over' : '') + '</span></div>' +
        '<div class="progress-wrap"><div class="progress-fill" style="width:' + pct + '%;' + (pct >= 100 ? 'background:#f87171;' : '') + '"></div></div>' +
      '</div>';

    document.getElementById('budget-summary').innerHTML = html;
  }

  /* ── Form Dropdowns ── */
  function populateFormDropdowns() {
    if (!selectedProject) return;

    // Contractors
    var conSel = document.getElementById('pf-contractor');
    var conHtml = '<option value="">Select contractor...</option>';
    var contractors = selectedProject.contractors || [];
    for (var i = 0; i < contractors.length; i++) {
      conHtml += '<option value="' + esc(contractors[i]) + '">' + esc(contractors[i]) + '</option>';
    }
    conHtml += '<option value="__other__">Other...</option>';
    conSel.innerHTML = conHtml;

    // Categories
    var catSel = document.getElementById('pf-category');
    var catHtml = '<option value="">Select category...</option>';
    var cats = selectedProject.categories || [];
    for (var i = 0; i < cats.length; i++) {
      catHtml += '<option value="' + esc(cats[i].name) + '">' + esc(cats[i].name) + '</option>';
    }
    catHtml += '<option value="__other__">Other</option>';
    catSel.innerHTML = catHtml;
  }

  /* ── Contractor "Other" toggle ── */
  document.getElementById('pf-contractor').addEventListener('change', function() {
    var wrap = document.getElementById('pf-contractor-other-wrap');
    if (this.value === '__other__') {
      wrap.classList.remove('hidden');
      document.getElementById('pf-contractor-other').focus();
    } else {
      wrap.classList.add('hidden');
    }
  });

  /* ── +15% Markup ── */
  document.getElementById('pf-markup').addEventListener('click', function() {
    var inp = document.getElementById('pf-amount');
    var val = parseMoney(inp.value);
    if (val > 0) {
      inp.value = (Math.round(val * 1.15 * 100) / 100);
    }
  });

  /* ── Submit Payment ── */
  document.getElementById('pf-save').addEventListener('click', function() {
    if (!selectedProject) { showToast('Select a project first.', 'error'); return; }

    var amount = parseMoney(document.getElementById('pf-amount').value);
    if (amount <= 0) { showToast('Enter a payment amount.', 'error'); return; }

    var contractorVal = document.getElementById('pf-contractor').value;
    var contractor = contractorVal === '__other__'
      ? (document.getElementById('pf-contractor-other').value || '').trim()
      : (contractorVal || '');

    var category = document.getElementById('pf-category').value;
    if (category === '__other__') category = 'Other';

    var paymentData = {
      projectId: selectedProject.id,
      projectName: selectedProject.name,
      date: document.getElementById('pf-date').value || todayStr(),
      amount: amount,
      contractor: contractor,
      category: category,
      description: document.getElementById('pf-desc').value || '',
      receiptImage: receiptBase64 || '',
      timestamp: new Date().toISOString(),
      source: 'portal'
    };

    var btn = document.getElementById('pf-save');
    btn.disabled = true;
    btn.textContent = receiptBase64 ? 'Uploading receipt...' : 'Submitting...';

    // Save payment to Firestore
    db.collection('payments').add(paymentData)
    .then(function() {
      showToast('Payment saved successfully!', 'success');
      sendPaymentEmail(paymentData);
      // Update local totals
      selectedProject.totalPaid = (selectedProject.totalPaid || 0) + amount;
      renderBudgetSummary();
      // Reset form
      document.getElementById('pf-amount').value = '';
      document.getElementById('pf-contractor').value = '';
      document.getElementById('pf-contractor-other').value = '';
      document.getElementById('pf-contractor-other-wrap').classList.add('hidden');
      document.getElementById('pf-category').value = '';
      document.getElementById('pf-desc').value = '';
      document.getElementById('pf-date').value = todayStr();
      clearReceiptPreview();
    })
    .catch(function(err) {
      showToast('Failed to submit: ' + err.message, 'error');
    })
    .finally(function() {
      btn.disabled = false;
      btn.textContent = 'Submit Payment';
    });
  });

  /* ── Init ── */
  loadProjects();
})();
</script>
</body>
</html>
